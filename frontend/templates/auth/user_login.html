{% extends 'base.html' %}

{% block content %}

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-person-circle text-primary" style="font-size: 3rem;"></i>
                        <h2 class="mt-3 fw-bold">Donor Login</h2>
                        <p class="text-muted">Access your donation dashboard</p>
                    </div>

                    <form method="POST">
                        {% csrf_token %}

                        {% if form.non_field_errors %}
                            <div class="alert alert-danger" role="alert">
                                <i class="bi bi-exclamation-triangle-fill"></i>
                                {{ form.non_field_errors.0 }}
                            </div>
                        {% endif %}

                        <div class="mb-3">
                            <label for="username" class="form-label fw-semibold">
                                <i class="bi bi-person-fill"></i> Username
                            </label>
                            <input type="text" name="username" id="username" class="form-control form-control-lg" required>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label fw-semibold">
                                <i class="bi bi-lock-fill"></i> Password
                            </label>
                            <input type="password" name="password" id="password" class="form-control form-control-lg" required>
                        </div>

                        <button class="btn btn-primary btn-lg w-100 mb-3" type="submit">
                            <i class="bi bi-box-arrow-in-right"></i> Login to Dashboard
                        </button>
                    </form>

                    <hr class="my-4">

                    <div class="text-center">
                        <p class="mb-2">Don't have an account?</p>
                        <a href="{% url 'user_signup' %}" class="btn btn-outline-primary">
                            <i class="bi bi-person-plus-fill"></i> Create Donor Account
                        </a>
                    </div>

                    <div class="text-center mt-3">
                        <a href="{% url 'index' %}" class="text-decoration-none">
                            <i class="bi bi-house-fill"></i> Back to Home
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
