{% extends 'base.html' %}

{% block content %}

<div class="card">
    <h2>Request Fund Unlock</h2>

    {% if error %}
        <p style="color: red;"><strong>Error:</strong> {{ error }}</p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <label>Select Donation to Unlock Funds From:</label><br>
        <select name="donation" required style="width: 100%; padding: 8px; margin: 5px 0;">
            <option value="">Choose a donation...</option>
            {% for donation in donations %}
            <option value="{{ donation.id }}">
                {{ donation.donor.username }} - {{ donation.amount }} ETH ({{ donation.created_at|date:"M d, Y" }})
            </option>
            {% endfor %}
        </select><br><br>

        <label>Amount to Request (ETH):</label><br>
        <input type="number" name="amount" step="0.001" required placeholder="Must be ≤ donation amount"><br><br>

        <label>Reason for Fund Request:</label><br>
        <textarea name="reason" rows="5" required style="width: 100%; padding: 8px;" 
                  placeholder="Explain how you will use these funds. This helps donors decide whether to approve."></textarea><br><br>

        <button type="submit" class="btn">Send Fund Unlock Request</button>
        <a href="{% url 'charity_dashboard' %}"><button type="button" class="btn" style="background: #757575;">Cancel</button></a>
    </form>

</div>

{% endblock %}
