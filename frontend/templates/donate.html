{% extends 'base.html' %}

{% block content %}

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-heart-fill text-danger" style="font-size: 3rem;"></i>
                        <h2 class="mt-3 fw-bold">Make a Donation</h2>
                        <p class="text-muted">Support charities with transparent blockchain donations</p>
                    </div>

                    <!-- Wallet Connection Status -->
                    <div id="wallet-status" class="alert alert-info mb-4">
                        <div class="d-flex align-items-center">
                            <i class="bi bi-wallet2 me-2"></i>
                            <div class="flex-grow-1">
                                <button id="connectWallet" class="btn btn-primary" onclick="connectMetaMask()">
                                    <i class="bi bi-wallet2"></i> Connect MetaMask Wallet
                                </button>
                                <p id="walletAddress" class="mb-0 d-none">
                                    <strong>Connected Wallet:</strong> <code id="address"></code>
                                </p>
                            </div>
                        </div>
                    </div>

                    <form method="POST" id="donationForm">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="charity" class="form-label fw-semibold">
                                <i class="bi bi-building-fill"></i> Select Charity/Organization
                            </label>
                            <select name="charity" id="charity" class="form-select form-select-lg" required>
                                <option value="">Choose a charity...</option>
                                {% for charity in charities %}
                                <option value="{{ charity.id }}">{{ charity.name }} ({{ charity.wallet_address|truncatechars:15 }})</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="donor" class="form-label fw-semibold">
                                <i class="bi bi-person-fill"></i> Your Name
                            </label>
                            <input type="text" name="donor" id="donor" class="form-control form-control-lg" required>
                        </div>

                        <div class="mb-3">
                            <label for="amount" class="form-label fw-semibold">
                                <i class="bi bi-coin"></i> Amount (ETH)
                            </label>
                            <input type="number" name="amount" id="amount" step="0.001" min="0.001" class="form-control form-control-lg" required>
                        </div>

                        <div class="mb-4">
                            <label for="reason" class="form-label fw-semibold">
                                <i class="bi bi-chat-quote"></i> Reason for Donation (Optional)
                            </label>
                            <textarea name="reason" id="reason" rows="3" class="form-control" placeholder="Why are you donating?"></textarea>
                        </div>

                        <input type="hidden" name="wallet_address" id="wallet_address">
                        <input type="hidden" name="signature" id="signature">
                        <input type="hidden" name="message" id="message">

                        <button type="button" class="btn btn-success btn-lg w-100" onclick="submitWithSignature()">
                            <i class="bi bi-heart-fill"></i> Make Donation
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let web3;
let userAccount = null;

async function connectMetaMask() {
    if (typeof window.ethereum !== 'undefined') {
        try {
            const accounts = await window.ethereum.request({
                method: 'eth_requestAccounts'
            });
            userAccount = accounts[0];
            web3 = new Web3(window.ethereum);

            document.getElementById('address').textContent = userAccount;
            document.getElementById('walletAddress').classList.remove('d-none');
            document.getElementById('connectWallet').style.display = 'none';
            document.getElementById('wallet_address').value = userAccount;

            // Update alert styling
            const walletStatus = document.getElementById('wallet-status');
            walletStatus.className = 'alert alert-success mb-4';

            alert('Wallet connected: ' + userAccount);
        } catch (error) {
            alert('Connection failed: ' + error.message);
        }
    } else {
        alert('MetaMask not installed. Please install MetaMask extension.');
    }
}

async function submitWithSignature() {
    if (!userAccount) {
        alert('Please connect MetaMask wallet first');
        return;
    }

    const charitySelect = document.querySelector('[name="charity"]');
    const donor = document.querySelector('[name="donor"]').value;
    const amount = document.querySelector('[name="amount"]').value;
    const reason = document.querySelector('[name="reason"]').value;

    if (!charitySelect.value || !donor || !amount) {
        alert('Please fill in all required fields');
        return;
    }

    const charityName = charitySelect.options[charitySelect.selectedIndex].text.split(' (')[0];
    const message = `Donate ${amount} ETH to ${charityName}. Donor: ${donor}${reason ? '. Reason: ' + reason : ''}`;

    try {
        const signature = await web3.eth.personal.sign(message, userAccount, '');

        document.getElementById('message').value = message;
        document.getElementById('signature').value = signature;

        document.getElementById('donationForm').submit();
    } catch (error) {
        alert('Signature failed: ' + error.message);
    }
}
</script>

{% endblock %}
