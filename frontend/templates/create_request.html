{% extends 'base.html' %}

{% block content %}

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-send-fill text-info" style="font-size: 3rem;"></i>
                        <h2 class="mt-3 fw-bold">Create Fund Usage Request</h2>
                        <p class="text-muted">Request access to donated funds for your charitable work</p>
                    </div>

                    {% if error %}
                        <div class="alert alert-danger" role="alert">
                            <i class="bi bi-exclamation-triangle-fill"></i>
                            {{ error }}
                        </div>
                    {% endif %}

                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="charity" class="form-label fw-semibold">
                                <i class="bi bi-building-fill"></i> Select Charity/Organization
                            </label>
                            <select name="charity" id="charity" class="form-select form-select-lg" required>
                                <option value="">Choose a charity...</option>
                                {% for charity in charities %}
                                <option value="{{ charity.id }}">{{ charity.name }} ({{ charity.wallet_address|truncatechars:15 }})</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="purpose" class="form-label fw-semibold">
                                <i class="bi bi-card-text"></i> Purpose & Description
                            </label>
                            <textarea name="purpose" id="purpose" class="form-control" rows="4" required
                                      placeholder="Describe how the funds will be used and why they are needed for your charitable work"></textarea>
                        </div>

                        <div class="mb-4">
                            <label for="amount" class="form-label fw-semibold">
                                <i class="bi bi-coin"></i> Amount Requested (ETH)
                            </label>
                            <input type="number" name="amount" id="amount" step="0.001" min="0.001" class="form-control form-control-lg" required>
                        </div>

                        <button class="btn btn-info btn-lg w-100" type="submit">
                            <i class="bi bi-send-fill"></i> Submit Fund Request
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
